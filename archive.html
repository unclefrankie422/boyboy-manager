var currentDept = "all";

function renderTabs() {
  var el = document.getElementById("tabs");
  var h = '<button class="tab active" onclick="switchDept(\'all\')">🌐 全部</button>';
  departments.forEach(function(d) {
    var c = (records[d.key] || []).length;
    h += '<button class="tab" onclick="switchDept(\''+d.key+'\')">'+d.icon+' '+d.name+' ('+c+')</button>';
  });
  el.innerHTML = h;
}

function switchDept(key) {
  currentDept = key;
  document.querySelectorAll(".tab").forEach(function(t, i) {
    var tabKey = i === 0 ? "all" : departments[i-1].key;
    t.classList.toggle("active", tabKey === key);
  });
  render();
}
